{% extends "layout.html" %}

{% block title %}UHU+ Roadmap | Strategic Evolution{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-6 py-12 lg:py-20 relative min-h-screen">
    
    <div class="text-center mb-32 animate-in fade-in slide-in-from-bottom-10 duration-700">
        <h1 class="text-5xl md:text-7xl font-speed glow-green italic tracking-tighter uppercase leading-none">
            Strategic <span class="text-[#16c784]">Roadmap</span>
        </h1>
        <p class="text-gray-500 font-black uppercase tracking-[0.4em] mt-6 text-[10px]">Strategic Evolution of the Trusted Pulse Layer</p>
    </div>

    <div class="absolute left-1/2 -translate-x-1/2 top-64 bottom-20 w-[1px] bg-zinc-900 hidden lg:block">
        <div id="timeline-growth" class="w-full bg-[#16c784] shadow-[0_0_15px_#16c784] h-0 transition-all duration-300"></div>
    </div>

    <div id="roadmap-container" class="space-y-24 lg:space-y-0 relative">
        <div class="py-20 text-center animate-pulse text-gray-700 font-black uppercase tracking-widest text-xs">
            Accessing Neural Timeline Data...
        </div>
    </div>
</div>

<script>
async function loadRoadmap() {
    try {
        const res = await fetch('/api/roadmap');
        const data = await res.json();
        const container = document.getElementById('roadmap-container');
        
        container.innerHTML = ''; 

        data.forEach((item, index) => {
            const isLeft = index % 2 === 0;
            const isCurrent = item.status === 100;
            const isPast = item.status === 200;
            
            const pulseEffect = isCurrent ? '<span class="absolute inline-flex h-full w-full rounded-full bg-[#16c784] opacity-75 animate-ping"></span>' : '';
            const glowColor = (isPast || isCurrent) ? 'bg-[#16c784]' : 'bg-zinc-800';
            
            container.innerHTML += `
                <div class="timeline-item opacity-0 translate-y-20 transition-all duration-1000 ease-out lg:flex items-center justify-center relative w-full ${isCurrent ? 'lg:py-20' : 'lg:py-10'}">
                    
                    <div class="absolute left-1/2 -translate-x-1/2 w-6 h-6 ${glowColor} rounded-full border-4 border-black z-20 hidden lg:block ${isCurrent ? 'shadow-[0_0_20px_#16c784]' : ''}">
                        ${pulseEffect}
                    </div>

                    <div class="uhu-card w-full lg:w-[45%] ${isLeft ? 'lg:mr-auto lg:text-right lg:pr-16' : 'lg:ml-auto lg:text-left lg:pl-16'} p-10 relative cursor-pointer hover:border-[#16c784]/50 group" onclick="expandPhase(${item.phase})">
                        <div class="absolute ${isLeft ? '-right-5' : '-left-5'} top-1/2 -translate-y-1/2 h-[1px] w-20 bg-zinc-900 group-hover:bg-[#16c784]/30 hidden lg:block"></div>

                        <p class="text-[9px] font-black ${isCurrent ? 'text-[#16c784]' : 'text-gray-500'} uppercase tracking-widest">${item.date}</p>
                        <h3 class="text-2xl font-speed italic ${isPast ? 'text-gray-400' : isCurrent ? 'text-white' : 'text-gray-600'} mt-2 mb-4 group-hover:text-[#16c784] transition-colors">Phase ${item.phase}: ${item.title}</h3>
                        
                        <p class="text-xs text-gray-400 leading-relaxed italic ${isLeft ? 'lg:ml-auto' : ''} max-w-sm">
                            ${item.desc}
                        </p>

                        <div id="phase-${item.phase}-detail" class="hidden mt-8 pt-8 border-t border-white/5 text-[11px] text-zinc-500 space-y-4">
                            <div class="p-4 bg-zinc-950/50 rounded-2xl border border-white/5">
                                <b class="text-[#16c784] uppercase block mb-1">Genesis Value:</b> 
                                <span class="text-white font-mono text-sm">${item.uhu_gains} THB</span>
                            </div>
                        </div>

                        <div class="mt-6 flex items-center ${isLeft ? 'justify-end' : 'justify-start'} gap-2 text-[8px] font-black uppercase tracking-widest text-gray-700">
                            <span class="w-1.5 h-1.5 rounded-full ${glowColor}"></span>
                            ${isPast ? 'Completed' : isCurrent ? 'In Progress' : 'Planned'}
                        </div>
                    </div>
                </div>
            `;
        });

        window.addEventListener('scroll', animateTimeline);
        animateTimeline(); 
    } catch (e) { console.error("Neural Node Connection Error"); }
}

function expandPhase(p) { document.getElementById(`phase-${p}-detail`).classList.toggle('hidden'); }

function animateTimeline() {
    const items = document.querySelectorAll('.timeline-item');
    items.forEach(item => {
        if (item.getBoundingClientRect().top < window.innerHeight * 0.9) {
            item.classList.remove('opacity-0', 'translate-y-20');
        }
    });
    const line = document.getElementById('timeline-growth');
    const scrollP = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
    if(line) line.style.height = `${scrollP}%`;
}

loadRoadmap();
</script>
{% endblock %}
