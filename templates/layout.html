<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UHU+ | Sovereign Pulse Layer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/index.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --uhu-green: #16c784; --uhu-black: #000000; }
        body { font-family: 'Inter', sans-serif; background: var(--uhu-black); color: #fff; margin: 0; }
        .font-speed { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .nav-link { color: #888; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; transition: 0.3s; }
        .nav-link:hover, .active-link { color: var(--uhu-green); }
        .uhu-card { background: rgba(9, 9, 11, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 bg-black/95 backdrop-blur-xl border-b border-white/5 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="/" class="flex items-center gap-6 group">
                <img src="{{ url_for('static', filename='img/logouhu.png') }}" class="h-14 w-auto drop-shadow-[0_0_15px_rgba(22,199,132,0.4)]" onerror="this.src='https://via.placeholder.com/150x50?text=UHU+LOGI'">
                <div class="flex flex-col">
                    <span class="text-3xl font-speed">UHU<span class="text-[#16c784]">+</span></span>
                    <span class="text-[8px] font-bold text-gray-500 tracking-[0.4em] uppercase">Trusted Pulse Layer</span>
                </div>
            </a>
            <div class="hidden xl:flex items-center gap-10">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/projects" class="nav-link">Projects</a>
                <a href="/roadmap" class="nav-link">Roadmap</a>
                <a href="/tokenomics" class="nav-link">Tokenomics</a>
                <a href="/legal-ai" class="nav-link">Legal AI</a>
                <a href="/whitepaper" class="nav-link">Whitepaper</a>
                <a href="/trading-bot" class="flex items-center gap-2 text-[#16c784] font-black text-[10px] uppercase tracking-widest bg-[#16c784]/5 border border-[#16c784]/20 px-5 py-2.5 rounded-xl hover:bg-[#16c784] hover:text-black transition-all">
                    <i class="fas fa-robot animate-pulse"></i> Algo-Bot
                </a>
            </div>
            <button id="wallet-btn" onclick="connectWallet()" class="bg-white text-black px-8 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:bg-[#16c784] transition">
                <i class="fas fa-wallet mr-2"></i><span id="wallet-label">Connect Wallet</span>
            </button>
        </div>
    </nav>

    <main class="flex-grow">{% block content %}{% endblock %}</main>

    <script>
        // 🦊 ระบบ MetaMask (แก้ไขให้เด้งแน่นอน)
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const address = accounts[0];
                    document.getElementById('wallet-label').innerText = address.substring(0,6) + "..." + address.substring(address.length - 4);
                    document.getElementById('wallet-btn').style.background = "#16c78422";
                    document.getElementById('wallet-btn').style.color = "#16c784";
                    console.log("Connected to:", address);
                } catch (err) { console.error("Denied access"); }
            } else { alert("กรุณาติดตั้ง MetaMask ครับกัปตัน!"); }
        }

        // 🤖 ระบบ Sync ข้อมูลบอท (แก้ไขให้รันอัตโนมัติ)
        async function syncBot() {
            if (window.location.pathname === '/trading-bot') {
                try {
                    const res = await fetch('/api/bot-status');
                    const data = await res.json();
                    if(document.getElementById('agent-status')) document.getElementById('agent-status').innerText = data.status;
                    if(document.getElementById('bot-strategy')) document.getElementById('bot-strategy').innerText = data.strategy;
                    if(document.getElementById('bot-balance')) document.getElementById('bot-balance').innerText = data.balance;
                } catch (e) { console.log("Bot API Syncing..."); }
            }
        }
        setInterval(syncBot, 5000); syncBot();
    </script>
</body>
</html>
